<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оргструктура - Завод ЗЭТА</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* =========================================
   БРЕНДБУК ЗАВОДА ЗЭТА (КОНСТАНТЫ)
   ========================================= */
:root {
    --brand-blue: #17417B;       /* Темный кобальт */
    --brand-orange: #FFAA00;     /* Жёлто-оранжевый */
    --brand-gray-dark: #838D9B;  /* Градация серого 1 */
    --brand-gray-light: #DCDEE4; /* Градация серого 2 */
    --bg-color: #f4f7fb;
    --text-main: #1a202c;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', Arial, sans-serif; }
body { background: var(--bg-color); min-height: 100vh; overflow: hidden; user-select: none; }

/* Режим встраивания (LMS Embed) */
body.embed-mode .header { display: none !important; }
body.embed-mode .main-container { height: 100vh !important; }

/* ШАПКА */
.header { background: var(--brand-blue); color: white; padding: 0 30px; height: 75px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(23, 65, 123, 0.2); border-bottom: 4px solid var(--brand-orange); z-index: 1000; position: relative; }
.logo { font-size: 28px; font-weight: 400; display: flex; align-items: center; gap: 12px; letter-spacing: 1px; font-family: 'Bebas Neue', sans-serif; }
.logo-icon { color: var(--brand-orange); font-size: 24px; }
.version-info { font-size: 13px; opacity: 0.8; font-weight: 400; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 4px; }
.mode-toggle { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-left: 20px; cursor: pointer; color: var(--brand-gray-light); transition: 0.3s;}
.mode-toggle:hover { color: white; }

.main-container { display: flex; height: calc(100vh - 75px); }

/* САЙДБАР АДМИНА */
.sidebar { width: 380px; background: #ffffff; border-right: 1px solid var(--brand-gray-light); display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.03); z-index: 900; }
.sidebar-content { padding: 30px 25px; overflow-y: auto; flex: 1; }
.panel-section { background: #ffffff; border-radius: 8px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--brand-gray-light); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
.section-title { font-size: 14px; color: var(--brand-blue); font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; padding-bottom: 15px; border-bottom: 1px solid var(--brand-gray-light); text-transform: uppercase; letter-spacing: 0.5px;}

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 11px; color: var(--brand-gray-dark); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-control { width: 100%; padding: 12px 15px; border: 2px solid var(--brand-gray-light); border-radius: 6px; font-size: 14px; background: #f8fafc; transition: 0.3s; color: var(--text-main); }
.form-control:focus { border-color: var(--brand-blue); background: white; outline: none; box-shadow: 0 0 0 3px rgba(23, 65, 123, 0.1); }
textarea.form-control { resize: vertical; min-height: 90px; }

.btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 12px; color: white; transition: all 0.2s; }
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--brand-blue); }
.btn-success { background: #10b981; } /* Оставляем зеленый для позитивных действий */
.btn-warning { background: var(--brand-orange); color: var(--brand-blue); }
.btn-danger { background: #ef4444; }
.btn-outline { background: white; border: 2px solid var(--brand-gray-light); color: var(--text-main); }
.btn-outline:hover { border-color: var(--brand-blue); color: var(--brand-blue); }

#statusMessage { padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; font-weight: 600; text-align: center; display: none; }
.status-success { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
.status-error { background: #fef2f2; color: #be123c; border: 1px solid #fecdd3; }
.status-warning { background: #fffbeb; color: var(--brand-orange); border: 1px solid var(--brand-orange); }

/* ПЛАВАЮЩИЙ ПОИСК (Для гостей) */
.floating-search-container { position: absolute; top: 30px; left: 30px; z-index: 100; display: none; }
.floating-search-box { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; box-shadow: 0 10px 25px rgba(23, 65, 123, 0.1); border: 2px solid var(--brand-blue); display: flex; align-items: center; width: 320px; transition: 0.3s;}
.floating-search-box input { border: none; background: transparent; width: 100%; padding: 5px; outline: none; font-size: 15px; color: var(--text-main); font-weight: 600;}
.floating-search-box input::placeholder { color: var(--brand-gray-dark); font-weight: 400;}
.floating-search-icon { color: var(--brand-blue); font-size: 18px; padding-right: 12px; }

/* РЕЗУЛЬТАТЫ ПОИСКА */
.search-results { max-height: 300px; overflow-y: auto; border-radius: 6px; margin-top: 5px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid var(--brand-gray-light); display: none; width: 100%; position: absolute; top: 100%; left: 0; z-index: 105; }
.search-item { padding: 15px; border-bottom: 1px solid var(--brand-gray-light); cursor: pointer; transition: 0.2s; }
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: #f8fafc; padding-left: 20px; border-left: 3px solid var(--brand-orange); }
.search-item-name { font-weight: 800; color: var(--brand-blue); font-size: 14px; }
.search-item-pos { font-size: 12px; color: var(--brand-gray-dark); margin-top: 4px; }

/* ОБЛАСТЬ ГРАФА */
.chart-area { flex: 1; position: relative; overflow: hidden; cursor: grab; background: var(--bg-color); }
.chart-area:active { cursor: grabbing; }
#tree-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; transition: transform 0.05s linear; }

/* ИНСТРУМЕНТЫ */
.toolbar { position: absolute; top: 30px; right: 30px; display: flex; gap: 10px; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 10px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--brand-gray-light); }
.tool-btn { width: 40px; height: 40px; border-radius: 6px; border: none; background: white; color: var(--brand-blue); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid transparent; }
.tool-btn:hover { background: var(--brand-blue); color: white; border-color: var(--brand-blue); }

/* =========================================
   ДВИЖОК ДЕРЕВА (Строгие линии)
   ========================================= */
.org-tree { display: flex; justify-content: center; padding: 60px; min-width: max-content; }
.org-tree ul { display: flex; justify-content: center; position: relative; padding-top: 50px; transition: all 0.4s; }
.org-tree li { float: left; text-align: center; list-style-type: none; position: relative; padding: 50px 20px 0 20px; transition: all 0.4s; }

/* Соединительные линии в фирменном сером цвете */
.org-tree li::before, .org-tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--brand-gray-dark); width: 50%; height: 50px; z-index: 1; }
.org-tree li::after { right: auto; left: 50%; border-left: 2px solid var(--brand-gray-dark); }
.org-tree li:only-child::after, .org-tree li:only-child::before { display: none; }
.org-tree li:only-child { padding-top: 0; }
.org-tree li:first-child::before, .org-tree li:last-child::after { border: 0 none; }
/* Убираем скругления для большей строгости (как в чертежах) */
.org-tree li:last-child::before { border-right: 2px solid var(--brand-gray-dark); border-radius: 0; }
.org-tree li:first-child::after { border-radius: 0; }
.org-tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--brand-gray-dark); width: 0; height: 50px; transform: translateX(-1px); z-index: 1; }

.org-tree li.collapsed > ul { opacity: 0; pointer-events: none; transform: translateY(-20px); position: absolute; }
.org-tree li.collapsed > .node-card .toggle-btn { transform: translateX(-50%) rotate(180deg); background: var(--brand-blue); color: white; border-color: var(--brand-blue); }

/* =========================================
   КАРТОЧКИ УЗЛОВ (ЗЭТА БРЕНДБУК)
   ========================================= */
.node-card { display: inline-flex; flex-direction: column; align-items: center; position: relative; border-radius: 8px; background: white; padding: 30px 25px 25px 25px; transition: all 0.3s; cursor: pointer; z-index: 5; border: 1px solid var(--brand-gray-light); box-shadow: 0 4px 15px rgba(23, 65, 123, 0.05); }
.node-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(23, 65, 123, 0.15); z-index: 10; border-color: var(--brand-blue); }

.node-card[draggable="true"] { cursor: grab; }
.node-card[draggable="true"]:active { cursor: grabbing; }
.node-card.drag-over { border: 3px dashed var(--brand-orange) !important; transform: scale(1.05); background: #fffcf0 !important; }

/* Цветовые схемы карточек по брендбуку */
.card-employee { width: 280px; border-top: 6px solid var(--brand-orange); }
.card-department { width: 320px; background: var(--brand-blue); border: none; color: white; padding: 35px 25px; }
.card-vacancy { width: 280px; background: white; border: 2px dashed var(--brand-gray-dark); }
.card-chain { width: 320px; background: white; border-top: 6px solid var(--brand-gray-dark); align-items: flex-start;}

/* Элементы внутри карточки */
.node-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--brand-gray-light); margin: 0 auto 20px auto; background: white; display: block; flex-shrink: 0; }
.card-department .node-img { border-color: var(--brand-orange); }

.node-name { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: var(--brand-blue); line-height: 1.3; text-align: center; width: 100%; word-break: break-word; }
.card-department .node-name { color: white; font-size: 22px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-weight: 400; }
.card-chain .node-name { text-align: left; margin-bottom: 20px; }
.card-vacancy .node-name { color: var(--brand-gray-dark); }

.node-title { font-size: 13px; color: var(--brand-gray-dark); font-weight: 600; margin-bottom: 15px; line-height: 1.4; text-align: center; }
.card-department .node-title { color: var(--brand-gray-light); }

.node-phone { font-size: 13px; font-weight: 700; color: var(--brand-blue); margin-top: auto; background: var(--bg-color); padding: 8px 16px; border-radius: 4px; display: inline-block; border: 1px solid var(--brand-gray-light); }
.vac-icon { font-size: 36px; color: var(--brand-gray-dark); margin-bottom: 20px; text-align: center; width: 100%; }

/* Иконка 'i' */
.info-icon-html { position: absolute; top: 15px; right: 15px; width: 28px; height: 28px; border-radius: 4px; background: var(--bg-color); color: var(--brand-blue); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; z-index: 20; font-family: serif; border: 1px solid var(--brand-gray-light); }
.info-icon-html:hover { background: var(--brand-blue); color: white; border-color: var(--brand-blue); }
.card-department .info-icon-html { background: rgba(255,255,255,0.1); color: white; border-color: transparent; }
.card-department .info-icon-html:hover { background: var(--brand-orange); color: var(--brand-blue); }

/* Кнопка сворачивания */
.toggle-btn { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid var(--brand-gray-dark); color: var(--brand-blue); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); z-index: 20; transition: 0.3s; }
.toggle-btn:hover { border-color: var(--brand-orange); background: var(--brand-orange); color: var(--brand-blue); transform: translateX(-50%) scale(1.1); }
.card-department .toggle-btn { border-color: white; background: var(--brand-blue); color: white;}

/* Цепочки */
.chain-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
.chain-item { display: flex; align-items: center; gap: 12px; background: var(--bg-color); padding: 10px 12px; border-radius: 6px; border: 1px solid var(--brand-gray-light); }
.chain-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--brand-gray-light);}
.chain-text { flex: 1; font-size: 13px; color: var(--text-main); line-height: 1.4; }

/* =========================================
   МОДАЛКИ И СТИКЕРЫ
   ========================================= */
.function-sticker { position: absolute; z-index: 10000; background: white; border-radius: 8px; padding: 25px; border: 2px solid var(--brand-blue); display: none; max-width: 350px; box-shadow: 0 15px 30px rgba(23, 65, 123, 0.2); }
.function-sticker-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brand-gray-light); padding-bottom: 15px; margin-bottom: 15px; font-weight: 800; color: var(--brand-blue); font-size: 16px; text-transform: uppercase;}
.function-sticker-close { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--brand-gray-dark); line-height: 1; transition: 0.2s;}
.function-sticker-close:hover { color: #ef4444; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(23, 65, 123, 0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s;}
.modal-overlay.active { opacity: 1; }
.modal-content { background: white; width: 550px; max-height: 90vh; overflow-y: auto; border-radius: 8px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); transform: translateY(20px); transition: 0.3s; border-top: 6px solid var(--brand-blue); }
.modal-overlay.active .modal-content { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 2px solid var(--brand-gray-light); padding-bottom: 15px; font-size: 22px; font-weight: 800; color: var(--brand-blue); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;}

.chain-constructor { background: var(--bg-color); border: 1px solid var(--brand-gray-light); border-radius: 6px; padding: 25px; margin-bottom: 20px; }
.chain-member { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--brand-gray-light); padding-bottom: 20px; }
.chain-member-fields { flex: 1; display: flex; flex-direction: column; gap: 12px; }

/* =========================================
   PRINT CSS (РЕЖИМ ПЕЧАТИ / PDF)
   ========================================= */
@media print {
    body, html { background: white !important; overflow: visible !important; min-height: auto !important; }
    .header, .sidebar, .toolbar, .function-sticker, .modal-overlay, .mode-toggle, #statusMessage, .floating-search-container { display: none !important; }
    .main-container { display: block !important; height: auto !important; }
    .chart-area { background: none !important; position: static !important; overflow: visible !important; }
    #tree-container { position: static !important; transform: scale(0.6) !important; transform-origin: top left !important; page-break-inside: avoid; }
    .org-tree { padding: 0 !important; justify-content: flex-start !important; }
    .node-card { box-shadow: none !important; border: 2px solid var(--brand-gray-dark) !important; transform: none !important; page-break-inside: avoid; background: white !important; color: black !important;}
    .card-department { border: 4px solid var(--brand-blue) !important; color: black !important;}
    .card-department .node-name, .card-department .node-title { color: black !important; }
    .toggle-btn, .info-icon-html { display: none !important; }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo"><span class="logo-icon">⚡</span><span>ЗАВОД ЗЭТА</span></div>
    <div class="version-info">ОФС 2026 | <span id="totalCount">0</span> узлов</div>
    <div class="mode-toggle">
        <label for="adminMode" style="cursor:pointer; font-weight:600;">Режим Администратора 🔒</label>
        <input type="checkbox" id="adminMode">
    </div>
</div>

<div class="main-container">
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            
            <div class="panel-section">
                <div class="section-title"><span>🔍</span> Поиск по базе</div>
                <input type="text" class="form-control" placeholder="Фамилия или должность..." onkeyup="searchNodes(this.value, 'adminSearchResults')">
                <div id="adminSearchResults" class="search-results"></div>
            </div>

            <div id="statusMessage"></div>

            <div class="panel-section admin-panel">
                <div class="section-title"><span>➕</span> Добавить узел</div>
                <div class="form-group"><label>Тип карточки</label>
                    <select id="newType" class="form-control" onchange="toggleFields('new')">
                        <option value="employee">Сотрудник</option>
                        <option value="department">Подразделение</option>
                        <option value="vacancy">Вакансия</option>
                        <option value="chain">Цепочка сотрудников</option>
                    </select>
                </div>
                <div class="form-group"><label>Название / ФИО</label><input type="text" id="newName" class="form-control" placeholder="Иванов Иван"></div>
                <div class="form-group"><label>Руководитель</label><select id="newPid" class="form-control"></select></div>

                <div id="newEmployeeFields">
                    <div class="form-group"><label>Должность</label><input type="text" id="newTitle" class="form-control"></div>
                    <div class="form-group"><label>Внутренний Телефон</label><input type="text" id="newPhone" class="form-control"></div>
                    <div class="form-group"><label>Фотография</label><input type="file" id="newPhoto" accept="image/*" class="form-control"></div>
                    <div class="form-group"><label>Функционал</label><textarea id="newFunc" class="form-control"></textarea></div>
                </div>
                <div id="newVacancyFields" style="display:none;">
                    <div class="form-group"><label>Искомая должность</label><input type="text" id="newVacancyPosition" class="form-control"></div>
                    <div class="form-group"><label>Привязка к отделу</label><select id="newVacancyDepartment" class="form-control"></select></div>
                </div>
                <div id="newChainFields" style="display:none;">
                    <div class="chain-constructor"><div id="chainMembersContainer"></div><button class="btn btn-outline" onclick="addChainMember('new')" id="addChainMemberBtn">➕ Добавить человека</button></div>
                </div>
                <div id="newDeptFuncFields" style="display:none;"><div class="form-group"><label>Функции подразделения</label><textarea id="newDeptFunc" class="form-control"></textarea></div></div>
                
                <button class="btn btn-primary" onclick="addNode()">Создать карточку</button>
            </div>

            <div class="panel-section admin-panel">
                <div class="section-title"><span>💾</span> Управление Базой</div>
                <button class="btn btn-outline" onclick="document.getElementById('jsonFile').click()">Загрузить JSON</button>
                <input type="file" id="jsonFile" accept=".json" style="display:none" onchange="handleJsonSelect(event)">
                <button class="btn btn-success" onclick="exportToJSON()">Скачать JSON (Бэкап)</button>
            </div>
        </div>
    </div>

    <div class="chart-area" id="viewport">
        
        <div class="floating-search-container" id="guestSearch">
            <div class="floating-search-box">
                <span class="floating-search-icon">🔍</span>
                <input type="text" placeholder="Поиск сотрудника..." onkeyup="searchNodes(this.value, 'guestSearchResults')">
            </div>
            <div id="guestSearchResults" class="search-results"></div>
        </div>

        <div class="toolbar">
            <button class="tool-btn" onclick="window.print()" title="Сохранить схему в PDF">🖨️</button>
            <button class="tool-btn" onclick="resetZoom()" title="По размеру окна">⛶</button>
            <button class="tool-btn" onclick="zoomIn()" title="Увеличить">➕</button>
            <button class="tool-btn" onclick="zoomOut()" title="Уменьшить">➖</button>
            <button id="undoBtn" class="tool-btn disabled" style="display:none;" onclick="undo()" title="Шаг назад">↩️</button>
            <button id="redoBtn" class="tool-btn disabled" style="display:none;" onclick="redo()" title="Шаг вперед">↪️</button>
        </div>
        <div id="tree-container"></div>
    </div>
</div>

<div id="functionSticker" class="function-sticker">
    <div class="function-sticker-header"><span id="stickerTitle"></span><button class="function-sticker-close" onclick="closeFunctionSticker()">✕</button></div>
    <div id="stickerContent" style="font-size:14px; white-space:pre-wrap; color:var(--text-main); line-height:1.6;"></div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header"><span>РЕДАКТИРОВАНИЕ</span><button class="function-sticker-close" onclick="closeModal()">✕</button></div>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Изменить Тип</label><select id="editType" class="form-control" onchange="toggleFields('edit')">
            <option value="employee">Сотрудник</option><option value="department">Подразделение</option><option value="vacancy">Вакансия</option><option value="chain">Цепочка</option>
        </select></div>
        <div class="form-group"><label>Название / ФИО</label><input type="text" id="editName" class="form-control"></div>
        <div class="form-group"><label>Переподчинить (Руководитель)</label><select id="editPid" class="form-control"></select></div>

        <div id="editEmployeeFields">
            <div class="form-group"><label>Должность</label><input type="text" id="editTitle" class="form-control"></div>
            <div class="form-group"><label>Телефон</label><input type="text" id="editPhone" class="form-control"></div>
            <div class="form-group" style="text-align:center;"><img id="editPhotoPreview" src="" style="width:120px; height:120px; object-fit:cover; display:none; border-radius:50%; margin:0 auto 15px auto; border: 4px solid var(--brand-gray-light);"><input type="file" id="editPhoto" accept="image/*" class="form-control"></div>
            <div class="form-group"><label>Функционал</label><textarea id="editFunc" class="form-control"></textarea></div>
        </div>
        <div id="editVacancyFields" style="display:none;"><div class="form-group"><label>Должность</label><input type="text" id="editVacancyPosition" class="form-control"></div><div class="form-group"><label>Отдел</label><select id="editVacancyDepartment" class="form-control"></select></div></div>
        <div id="editChainFields" style="display:none;"><div class="chain-constructor"><div id="editChainMembersContainer"></div><button class="btn btn-outline" onclick="addChainMember('edit')" id="addEditChainMemberBtn">➕ Добавить человека</button></div></div>
        <div id="editDeptFuncFields" style="display:none;"><div class="form-group"><label>Функции подразделения</label><textarea id="editDeptFunc" class="form-control"></textarea></div></div>

        <div style="display:flex; gap:12px; margin-top:30px;">
            <button class="btn btn-primary" onclick="saveEdit()">Сохранить изменения</button>
            <button class="btn btn-warning" onclick="copyNode()">Дублировать</button>
            <button class="btn btn-danger" onclick="deleteNode()">Удалить узел</button>
        </div>
    </div>
</div>

<script>
    // =========================================
    // НАСТРОЙКИ БЕЗОПАСНОСТИ И ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    // =========================================
    const ADMIN_PIN = "2026"; 
    
    let isAdmin = false; 
    let isDirty = false; 
    let nodes = [];
    let undoHistory = [], redoStack = [];
    let currentChainMembers = [], currentEditChainMembers = [];
    let collapsedNodes = new Set();
    
    const defaultAvatar = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NiZDVlMCI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDQgMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==";

    let scale = 1, posX = 0, posY = 0;
    let isDragging = false, startX, startY;
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('tree-container');

    // =========================================
    // ИНИЦИАЛИЗАЦИЯ И AUTO-FETCH
    // =========================================
    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('embed') === 'true') {
            document.body.classList.add('embed-mode');
        }

        try {
            const response = await fetch('structure.json');
            if (response.ok) {
                const data = await response.json();
                nodes = data.data || data;
            }
        } catch (error) {
            console.log("Auto-fetch skipped. Checking local cache.");
        }

        if (!nodes || nodes.length === 0) {
            try {
                const saved = localStorage.getItem('zetarus_ofs_data');
                if (saved) nodes = JSON.parse(saved);
            } catch(e) {}
        }
        
        if (!nodes || nodes.length === 0) {
            nodes = [{ id: "1", pid: "", type: 'department', name: "Завод ЗЭТА", title: "Структура пуста. Загрузите базу.", phone: "" }];
        }

        const adminCheckbox = document.getElementById('adminMode');
        if (adminCheckbox) {
            adminCheckbox.checked = false; 
            adminCheckbox.addEventListener('change', function() {
                if (this.checked) {
                    let pin = prompt("Введите ПИН-код администратора:");
                    if (pin === ADMIN_PIN) {
                        isAdmin = true;
                        showStatus("Успешная авторизация. Редактирование открыто.", "success");
                    } else {
                        this.checked = false;
                        isAdmin = false;
                        alert("Доступ запрещен. Неверный ПИН-код.");
                    }
                } else {
                    isAdmin = false;
                }
                updateAdminUI();
            });
        }

        window.addEventListener('beforeunload', function (e) {
            if (isDirty) {
                e.preventDefault();
                e.returnValue = 'У вас есть несохраненные изменения!';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (isAdmin && e.ctrlKey) { if (e.key === 'z') undo(); else if (e.key === 'y') redo(); }
        });

        document.addEventListener('click', function(e) {
            const s = document.getElementById('functionSticker');
            if (s && s.style.display === 'block' && !s.contains(e.target) && !e.target.closest('.info-icon-html')) {
                s.style.display = 'none';
            }
            if (!e.target.closest('.search-results') && !e.target.closest('input[placeholder*="Поиск"]') && !e.target.closest('input[placeholder*="ищете"]')) {
                document.querySelectorAll('.search-results').forEach(el => el.style.display = 'none');
            }
        });

        initPanZoom();
        updateAdminUI();
        refreshAll();
        setTimeout(centerTree, 150);
    };

    function updateAdminUI() {
        const sb = document.getElementById('sidebar');
        const guestSearch = document.getElementById('guestSearch');
        
        if (isAdmin) {
            sb.style.display = 'flex';
            setTimeout(() => sb.style.transform = 'translateX(0)', 10);
            if (guestSearch) guestSearch.style.display = 'none';
        } else {
            sb.style.transform = 'translateX(-100%)';
            setTimeout(() => { if (!isAdmin) sb.style.display = 'none'; }, 300);
            if (guestSearch) guestSearch.style.display = 'block';
        }

        document.querySelectorAll('.admin-panel').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
        document.querySelectorAll('#undoBtn, #redoBtn').forEach(el => el.style.display = isAdmin ? 'flex' : 'none');
        renderTree(); 
    }

    // =========================================
    // АЛГОРИТМ УМНОГО ПОИСКА
    // =========================================
    function searchNodes(val, containerId) {
        const resDiv = document.getElementById(containerId);
        if (!val || val.length < 2) { resDiv.style.display = 'none'; return; }
        
        let term = val.toLowerCase();
        let filtered = nodes.filter(n => {
            let nName = (n.name || '').toLowerCase();
            let nTitle = (n.title || '').toLowerCase();
            return nName.includes(term) || nTitle.includes(term);
        });
        
        resDiv.innerHTML = '';
        if (filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(n => {
                let div = document.createElement('div');
                div.className = 'search-item';
                let subtext = n.title ? n.title : (n.type === 'department' ? 'Подразделение' : (n.type === 'chain' ? 'Группа' : ''));
                div.innerHTML = `<div class="search-item-name">${n.name||'Без имени'}</div><div class="search-item-pos">${subtext}</div>`;
                div.onclick = () => { locateNode(n.id); resDiv.style.display='none'; };
                resDiv.appendChild(div);
            });
        } else {
            resDiv.style.display = 'none';
        }
    }

    function locateNode(id) {
        let currentId = id;
        while(currentId) {
            let n = nodes.find(x => x.id === currentId);
            if(!n || !n.pid) break;
            if(collapsedNodes.has(n.pid)) collapsedNodes.delete(n.pid);
            currentId = n.pid;
        }
        renderTree(); 

        setTimeout(() => {
            const el = document.querySelector(`.node-card[onclick*="'${id}'"]`);
            if(!el) return;
            
            let x = 0, y = 0;
            let curr = el;
            while(curr && !curr.classList.contains('org-tree')) {
                x += curr.offsetLeft;
                y += curr.offsetTop;
                curr = curr.offsetParent;
            }
            
            x += el.offsetWidth / 2;
            y += el.offsetHeight / 2;
            
            scale = 1; 
            posX = (viewport.clientWidth / 2) - x;
            posY = (viewport.clientHeight / 2) - y;
            updateTransform();
            
            el.style.transition = "0.4s";
            el.style.boxShadow = "0 0 0 10px rgba(255, 170, 0, 0.4), 0 20px 40px rgba(0,0,0,0.2)";
            setTimeout(() => { el.style.boxShadow = ""; }, 2500);
        }, 100);
    }

    // =========================================
    // СОВРЕМЕННЫЙ РЕНДЕР ДЕРЕВА
    // =========================================
    function renderTree() {
        container.innerHTML = '';
        if (nodes.length === 0) return;

        let roots = nodes.filter(n => n.pid === "");
        if (roots.length === 0) roots = [nodes[0]];

        let treeHtml = '<div class="org-tree"><ul>';
        roots.forEach(root => { treeHtml += buildTreeRecursive(root.id); });
        treeHtml += '</ul></div>';
        
        container.innerHTML = treeHtml;
    }

    function buildTreeRecursive(parentId) {
        let node = nodes.find(n => n.id === parentId);
        if (!node) return '';

        let children = nodes.filter(n => n.pid === parentId);
        let hasChildren = children.length > 0;
        let isCollapsed = collapsedNodes.has(node.id);
        
        let liClass = isCollapsed ? 'collapsed' : '';
        let adminClass = isAdmin ? 'admin-mode' : '';
        
        let toggleBtn = hasChildren ? `<div class="toggle-btn" onclick="event.stopPropagation(); toggleNode('${node.id}')">▼</div>` : '';
        let dragAttrs = isAdmin ? `draggable="true" ondragstart="dragStart(event, '${node.id}')" ondrop="dropNode(event, '${node.id}')" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)"` : '';

        let html = `<li class="${liClass}">
            <div class="node-card ${getCardClass(node.type)} ${adminClass}" 
                 ${dragAttrs}
                 onclick="nodeClick('${node.id}')">
                ${getCardContent(node)}
                ${toggleBtn}
            </div>`;

        if (hasChildren) {
            html += '<ul>';
            children.forEach(child => { html += buildTreeRecursive(child.id); });
            html += '</ul>';
        }
        html += '</li>';
        return html;
    }

    function getCardClass(type) {
        if (type === 'department') return 'card-department';
        if (type === 'vacancy') return 'card-vacancy';
        if (type === 'chain') return 'card-chain';
        return 'card-employee';
    }

    function getCardContent(data) {
        let photo = data.img ? (data.img.startsWith('data:') ? data.img : 'photos/' + data.img) : defaultAvatar;
        let info = `<div class="info-icon-html" onclick="event.stopPropagation(); showFunctionSticker('${data.id}')" title="Детали">i</div>`;
        
        if (data.type === 'employee') {
            return `${info}<img class="node-img" src="${photo}" onerror="this.src='${defaultAvatar}'">
                    <div class="node-name">${data.name||'Без имени'}</div>
                    <div class="node-title">${data.title||''}</div>
                    ${data.phone ? `<div class="node-phone">Вн: ${data.phone}</div>` : ''}`;
        }
        if (data.type === 'department') {
            return `${info}<div class="node-name">${data.name||'Подразделение'}</div>`;
        }
        if (data.type === 'vacancy') {
            return `<div class="vac-icon">👤+</div><div class="node-name">${data.name||'Вакансия'}</div>
                    <div class="node-title">${data.title||''}</div>
                    <div class="node-phone" style="font-style:italic;">${data.phone||'ОТКРЫТА'}</div>`;
        }
        if (data.type === 'chain') {
            let ch = '<div class="chain-list">';
            (data.chain || []).forEach((m, i) => {
                let mImg = m.img || defaultAvatar;
                ch += `<div class="chain-item">
                        <img class="chain-img" src="${mImg}" onerror="this.src='${defaultAvatar}'">
                        <div class="chain-text"><b>${m.fio||'Сотрудник'}</b>
                        ${m.func ? `<br><span style="color:var(--brand-gray-dark);">🎯 ${m.func}</span>` : ''}
                        ${m.phone ? `<br><span style="color:var(--brand-blue); font-weight:700;">📞 ${m.phone}</span>` : ''}
                        </div></div>`;
            });
            ch += '</div>';
            return `${info}<div class="node-name">${data.name||''}</div>${ch}`;
        }
        return '';
    }

    function toggleNode(id) {
        if (collapsedNodes.has(id)) collapsedNodes.delete(id);
        else collapsedNodes.add(id);
        renderTree();
    }

    function nodeClick(id) {
        if (isAdmin) openEditModal(id);
    }

    // =========================================
    // NATIVE HTML5 DRAG & DROP
    // =========================================
    function dragStart(ev, id) {
        ev.dataTransfer.setData("text/plain", id);
        ev.dataTransfer.effectAllowed = "move";
        setTimeout(() => { ev.target.style.opacity = '0.5'; }, 0);
    }

    function allowDrop(ev) { ev.preventDefault(); ev.dataTransfer.dropEffect = "move"; }

    function dragEnter(ev) {
        ev.preventDefault();
        const card = ev.target.closest('.node-card');
        if (card) card.classList.add('drag-over');
    }

    function dragLeave(ev) {
        const card = ev.target.closest('.node-card');
        if (card) card.classList.remove('drag-over');
    }

    function dropNode(ev, targetId) {
        ev.preventDefault();
        document.querySelectorAll('.node-card').forEach(el => { el.classList.remove('drag-over'); el.style.opacity = '1'; });

        const draggedId = ev.dataTransfer.getData("text/plain");
        if (!draggedId || draggedId === targetId) return;

        if (isDescendant(draggedId, targetId)) {
            showStatus("Системный отказ: Создание петли подчинения запрещено.", "error");
            return;
        }

        const node = nodes.find(n => n.id === draggedId);
        if (node) {
            pushHistory();
            node.pid = targetId;
            if (collapsedNodes.has(targetId)) collapsedNodes.delete(targetId);
            setDirty();
            refreshAll();
            showStatus("Сотрудник успешно переведен.", "success");
        }
    }

    function isDescendant(parentId, childId) {
        let currentId = childId;
        while (currentId !== "") {
            if (currentId === parentId) return true;
            let node = nodes.find(n => n.id === currentId);
            if (!node || !node.pid) break;
            currentId = node.pid;
        }
        return false;
    }

    // =========================================
    // PAN & ZOOM
    // =========================================
    function initPanZoom() {
        viewport.addEventListener('mousedown', e => {
            if (e.target.closest('.node-card')) return;
            isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; viewport.style.cursor = 'grabbing';
        });
        window.addEventListener('mouseup', () => { isDragging = false; viewport.style.cursor = 'grab'; });
        window.addEventListener('mousemove', e => { if (!isDragging) return; e.preventDefault(); posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); });

        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = -e.deltaY * 0.001;
            let newScale = scale * Math.exp(delta);
            newScale = Math.max(0.15, Math.min(newScale, 2.5));
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            posX = mouseX - (mouseX - posX) * (newScale / scale); posY = mouseY - (mouseY - posY) * (newScale / scale);
            scale = newScale; updateTransform();
        }, { passive: false });
    }

    function updateTransform() { container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
    function resetZoom() { scale = 1; centerTree(); }
    function zoomIn() { scale *= 1.2; updateTransform(); }
    function zoomOut() { scale /= 1.2; updateTransform(); }
    function centerTree() {
        const treeEl = document.querySelector('.org-tree');
        if (treeEl) {
            const vWidth = viewport.clientWidth; const tWidth = treeEl.scrollWidth;
            posX = (vWidth - tWidth * scale) / 2; posY = 80; updateTransform();
        }
    }

    // =========================================
    // БУЛЬДОЗЕР ДАННЫХ И CRUD
    // =========================================
    function setDirty() {
        isDirty = true;
        const msg = document.getElementById('statusMessage');
        msg.innerText = "Есть несохраненные изменения! Обязательно скачайте JSON.";
        msg.className = "status-warning";
        msg.style.display = "block";
    }

    function clearDirty() {
        isDirty = false;
        document.getElementById('statusMessage').style.display = "none";
    }

    function validateTopology() {
        if (!nodes || nodes.length === 0) return;
        let unique = []; let seen = new Set();
        nodes.forEach(n => {
            if (!n.id) n.id = String(Date.now() + Math.random());
            n.id = String(n.id);
            n.pid = (n.pid !== null && n.pid !== undefined && n.pid !== "") ? String(n.pid) : "";
            if (!seen.has(n.id)) { seen.add(n.id); unique.push(n); }
        });
        nodes = unique;

        const validIds = new Set(nodes.map(n => n.id));
        nodes.forEach(n => { if (n.pid !== "" && !validIds.has(n.pid)) n.pid = ""; });

        nodes.forEach(n => {
            let curr = n, path = new Set([curr.id]), cycle = false;
            while (curr.pid !== "") {
                let p = nodes.find(x => x.id === curr.pid);
                if (!p || path.has(p.id)) { cycle = true; break; }
                path.add(p.id); curr = p;
            }
            if (cycle) n.pid = "";
        });

        let roots = nodes.filter(n => n.pid === "");
        if (roots.length > 1) {
            for (let i = 1; i < roots.length; i++) roots[i].pid = roots[0].id;
        } else if (roots.length === 0 && nodes.length > 0) {
            nodes[0].pid = "";
        }
    }

    function refreshAll() {
        validateTopology();
        saveData(); 
        updateSelects();
        document.getElementById('totalCount').innerText = nodes.length;
        renderTree();
    }

    function pushHistory() { undoHistory.push(JSON.parse(JSON.stringify(nodes))); if (undoHistory.length > 15) undoHistory.shift(); redoStack = []; updateUR(); }
    function undo() { if (undoHistory.length === 0) return; redoStack.push(JSON.parse(JSON.stringify(nodes))); nodes = undoHistory.pop(); setDirty(); refreshAll(); updateUR(); }
    function redo() { if (redoStack.length === 0) return; undoHistory.push(JSON.parse(JSON.stringify(nodes))); nodes = redoStack.pop(); setDirty(); refreshAll(); updateUR(); }
    function updateUR() {
        let uBtn = document.getElementById('undoBtn'); let rBtn = document.getElementById('redoBtn');
        if(uBtn) uBtn.classList.toggle('disabled', undoHistory.length===0);
        if(rBtn) rBtn.classList.toggle('disabled', redoStack.length===0);
    }

    function saveData() { localStorage.setItem('zetarus_ofs_data', JSON.stringify(nodes)); }
    function showStatus(m, t) {
        const e = document.getElementById('statusMessage'); e.innerText = m; e.className = t==='success' ? 'status-success' : 'status-error'; e.style.display = 'block'; setTimeout(() => {if(!isDirty) e.style.display='none';}, 3500);
    }

    function updateSelects() {
        ['newPid', 'editPid'].forEach(id => {
            const s = document.getElementById(id); if (!s) return;
            s.innerHTML = '<option value="">(Корень - Высшее руководство)</option>';
            nodes.forEach(n => {
                let prefix = n.type==='department' ? '[ОТДЕЛ] ' : (n.type==='chain' ? '[ГРУППА] ' : '👤 ');
                let opt = document.createElement('option'); opt.value = n.id; opt.text = prefix + n.name; s.add(opt);
            });
        });
        ['newVacancyDepartment', 'editVacancyDepartment'].forEach(id => {
            const s = document.getElementById(id); if (!s) return;
            s.innerHTML = '<option value="">(Без привязки)</option>';
            nodes.filter(n => n.type==='department').forEach(n => {
                let opt = document.createElement('option'); opt.value = n.id; opt.text = n.name; s.add(opt);
            });
        });
    }

    function toggleFields(p) {
        const t = document.getElementById(p+'Type').value;
        ['Employee','Vacancy','Chain','DeptFunc'].forEach(f => { const e = document.getElementById(p+f+'Fields'); if(e) e.style.display='none'; });
        if(t==='department') document.getElementById(p+'DeptFuncFields').style.display='block';
        else if(t==='vacancy') document.getElementById(p+'VacancyFields').style.display='block';
        else if(t==='chain') { document.getElementById(p+'ChainFields').style.display='block'; if(p==='new' && currentChainMembers.length===0) addChainMember('new'); }
        else document.getElementById(p+'EmployeeFields').style.display='block';
    }

    async function addNode() {
        if (!isAdmin) return;
        const type = document.getElementById('newType').value, name = document.getElementById('newName').value, pid = document.getElementById('newPid').value;
        if (!name) return showStatus("Ошибка: Имя обязательно к заполнению", "error");
        pushHistory();
        let n = { id: String(Date.now()), pid: pid||"", type: type, name: name };
        if (type==='employee') { n.title = document.getElementById('newTitle').value; n.phone = document.getElementById('newPhone').value; n.func = document.getElementById('newFunc').value; const f = document.getElementById('newPhoto').files[0]; if(f) n.img = await comp(f); }
        else if (type==='department') n.deptFunc = document.getElementById('newDeptFunc').value;
        else if (type==='vacancy') { n.title = document.getElementById('newVacancyPosition').value; n.phone = "ВАКАНСИЯ"; n.vacancyDeptId = document.getElementById('newVacancyDepartment').value; }
        else if (type==='chain') n.chain = currentChainMembers.filter(m => m.fio.trim()!=='');
        nodes.push(n); setDirty(); refreshAll(); showStatus("Карточка успешно создана", "success");
    }

    function openEditModal(id) {
        if (!isAdmin) return;
        const n = nodes.find(x => x.id === String(id)); if (!n) return;
        document.getElementById('editId').value = n.id; document.getElementById('editType').value = n.type||'employee'; document.getElementById('editName').value = n.name||''; document.getElementById('editPid').value = n.pid||'';
        document.getElementById('editTitle').value = n.title||''; document.getElementById('editPhone').value = n.phone||''; document.getElementById('editFunc').value = n.func||''; document.getElementById('editDeptFunc').value = n.deptFunc||''; document.getElementById('editVacancyPosition').value = n.title||''; document.getElementById('editVacancyDepartment').value = n.vacancyDeptId||'';
        const p = document.getElementById('editPhotoPreview');
        if (n.img) { p.src = n.img.startsWith('data:') ? n.img : ('photos/' + n.img); p.style.display='block'; } else p.style.display='none';
        if (n.type === 'chain') { currentEditChainMembers = JSON.parse(JSON.stringify(n.chain||[])); renderChainUI('edit'); }
        toggleFields('edit'); 
        
        const modal = document.getElementById('editModal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
    }

    async function saveEdit() {
        const id = document.getElementById('editId').value; const n = nodes.find(x => x.id === id); if (!n) return;
        pushHistory();
        n.type = document.getElementById('editType').value; n.name = document.getElementById('editName').value; n.pid = document.getElementById('editPid').value||"";
        if(n.type==='employee') { n.title = document.getElementById('editTitle').value; n.phone = document.getElementById('editPhone').value; n.func = document.getElementById('editFunc').value; const f = document.getElementById('editPhoto').files[0]; if(f) n.img = await comp(f); }
        else if(n.type==='department') n.deptFunc = document.getElementById('editDeptFunc').value;
        else if(n.type==='vacancy') { n.title = document.getElementById('editVacancyPosition').value; n.vacancyDeptId = document.getElementById('editVacancyDepartment').value; n.phone = "ВАКАНСИЯ"; }
        else if(n.type==='chain') n.chain = currentEditChainMembers.filter(m => m.fio.trim()!=='');
        setDirty(); refreshAll(); closeModal(); showStatus("Изменения применены", "success");
    }

    function deleteNode() { if(confirm("Внимание! Подчиненные этого узла будут переведены на уровень выше. Продолжить?")) { pushHistory(); const id = document.getElementById('editId').value; nodes = nodes.filter(n => n.id!==id); setDirty(); refreshAll(); closeModal(); } }
    function copyNode() { pushHistory(); const n = JSON.parse(JSON.stringify(nodes.find(x => x.id===document.getElementById('editId').value))); n.id = String(Date.now()); n.name += " (Копия)"; nodes.push(n); setDirty(); refreshAll(); closeModal(); }
    
    function closeModal() { 
        const modal = document.getElementById('editModal');
        modal.classList.remove('active');
        setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    function addChainMember(p) { let a = p==='new' ? currentChainMembers : currentEditChainMembers; if(a.length<6) { a.push({fio:'',func:'',phone:'',img:''}); renderChainUI(p); } }
    function removeChainMember(p,i) { let a = p==='new' ? currentChainMembers : currentEditChainMembers; a.splice(i,1); renderChainUI(p); }
    function updateChainData(p,i,f,v) { let a = p==='new' ? currentChainMembers : currentEditChainMembers; a[i][f] = v; }
    async function handleCPhoto(p,i,input) { if(input.files[0]) { let a = p==='new' ? currentChainMembers : currentEditChainMembers; a[i].img = await comp(input.files[0]); renderChainUI(p); } }
    
    function renderChainUI(p) {
        const a = p==='new' ? currentChainMembers : currentEditChainMembers; const c = document.getElementById(p==='new' ? 'chainMembersContainer' : 'editChainMembersContainer'); c.innerHTML='';
        for(let i=0; i<a.length; i++) {
            let m = a[i]; let pSrc = m.img || defaultAvatar;
            c.innerHTML += `<div class="chain-member"><b style="color:var(--brand-blue); font-size:18px;">${i+1}</b><div class="chain-member-fields"><div style="display:flex;justify-content:space-between"><label>Сотрудник</label><button onclick="removeChainMember('${p}',${i})" style="color:#ef4444;border:none;background:none;cursor:pointer;font-weight:700;">✕ Удалить</button></div>
            <div style="display:flex; gap:15px; align-items:center;"><img src="${pSrc}" style="width:45px;height:45px;border-radius:50%;object-fit:cover; border: 2px solid var(--brand-gray-light);"><input type="file" style="font-size:12px; flex:1;" accept="image/*" onchange="handleCPhoto('${p}',${i},this)"></div>
            <input type="text" placeholder="ФИО" class="form-control" value="${m.fio||''}" onchange="updateChainData('${p}',${i},'fio',this.value)"><input type="text" placeholder="Специализация" class="form-control" value="${m.func||''}" onchange="updateChainData('${p}',${i},'func',this.value)"><input type="text" placeholder="Контакт" class="form-control" value="${m.phone||''}" onchange="updateChainData('${p}',${i},'phone',this.value)"></div></div>`;
        }
        document.getElementById(p==='new'?'addChainMemberBtn':'addEditChainMemberBtn').disabled = a.length >= 6;
    }

    function showFunctionSticker(id) {
        const n = nodes.find(x=>x.id===id); const s = document.getElementById('functionSticker'); if(!n) return;
        let t = n.type === 'chain' ? 'Группа: ' : (n.type === 'department' ? 'Описание: ' : 'Обязанности: ');
        document.getElementById('stickerTitle').innerText = t + n.name;
        let c = n.func || n.deptFunc || 'Нет данных для отображения';
        if (n.type === 'chain') { c = ''; let arr = n.chain || []; for(let i=0; i<arr.length; i++) c += `[${i+1}] ${arr[i].fio||'Сотрудник'}\n   📞 ${arr[i].phone||'-'}\n   🎯 ${arr[i].func||'-'}\n\n`; }
        document.getElementById('stickerContent').innerText = c;
        s.style.left = (window.event.clientX + 20) + 'px'; s.style.top = (window.event.clientY + 20) + 'px'; s.style.display = 'block';
    }
    function closeFunctionSticker() { document.getElementById('functionSticker').style.display = 'none'; }

    function comp(f) {
        return new Promise(r => { const rd = new FileReader(); rd.onload = e => { const img = new Image(); img.onload = () => { const cvs = document.createElement('canvas'); const max = 250; let w = img.width, h = img.height; if(w>h) { if(w>max){h*=max/w; w=max;} } else { if(h>max){w*=max/h; h=max;} } cvs.width=w; cvs.height=h; cvs.getContext('2d').drawImage(img,0,0,w,h); r(cvs.toDataURL('image/jpeg',0.85)); }; img.src = e.target.result; }; rd.readAsDataURL(f); });
    }

    function exportToJSON() { 
        const bl = new Blob([JSON.stringify({version:"6.0",data:nodes}, null, 2)], {type:'application/json'}); 
        const l = document.createElement("a"); l.href = URL.createObjectURL(bl); l.download = `structure.json`; l.click(); 
        clearDirty(); showStatus("Резервная копия скачана", "success");
    }
    
    function handleJsonSelect(e) { const f = e.target.files[0]; if(!f) return; const rd = new FileReader(); rd.onload = ev => { try { let d = JSON.parse(ev.target.result); d = d.data || d; if(!Array.isArray(d)) throw new Error("Parse error"); pushHistory(); nodes = d; clearDirty(); refreshAll(); showStatus("База успешно загружена", "success"); } catch(err) { showStatus("Ошибка чтения файла", "error"); } }; rd.readAsText(f); e.target.value=''; }
</script>
</body>
</html>
